<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Ledgriq - The OS for Modern Retail</title>
	<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 flex h-screen items-center justify-center font-sans text-gray-800">

	<div class="bg-white rounded-2xl shadow-xl flex w-full max-w-4xl overflow-hidden">

		<div class="w-1/2 bg-blue-900 text-white p-12 flex flex-col justify-center hidden md:flex">
			<h1 class="text-4xl font-extrabold mb-2">Ledgriq.</h1>
			<p class="text-blue-200 mb-8">The Operating System for Modern Retail.</p>
			<div class="space-y-4">
				<p class="flex items-center"><span class="mr-2">✓</span> Multi-Store Inventory Sync</p>
				<p class="flex items-center"><span class="mr-2">✓</span> Automated GST Invoicing</p>
				<p class="flex items-center"><span class="mr-2">✓</span> Real-time Analytics</p>
			</div>
		</div>

		<div class="w-full md:w-1/2 p-12 relative">

			<div id="register-form" class="block">
				<h2 class="text-2xl font-bold text-gray-900 mb-2">Set up your shop</h2>
				<p class="text-gray-500 mb-6 text-sm">Join Ledgriq and start managing your business.</p>

				<form action="/register" method="POST" class="space-y-4">
					<div>
						<label class="block text-sm font-medium text-gray-700 mb-1">Shop/Business
							Name</label>
						<input type="text" name="shop_name" required
							class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-900">
					</div>
					<div>
						<label class="block text-sm font-medium text-gray-700 mb-1">Admin
							Email</label>
						<input type="email" name="email" required
							class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-900">
					</div>
					<div>
						<label
							class="block text-sm font-medium text-gray-700 mb-1">Password</label>
						<input type="password" name="password" required
							class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-900">
					</div>
					<button type="submit"
						class="w-full bg-blue-900 hover:bg-blue-800 text-white font-bold py-3 rounded-lg transition">Create
						Account</button>
				</form>
				<p class="mt-6 text-center text-sm text-gray-600">
					Already have an account? <button onclick="toggleForms()"
						class="text-blue-900 font-bold hover:underline">Log in</button>
					</form>
			</div>

			<div id="login-form" class="hidden">
				<h2 class="text-2xl font-bold text-gray-900 mb-2">Welcome Back</h2>
				<p class="text-gray-500 mb-6 text-sm">Log in to your Ledgriq dashboard.</p>

				<form action="/login" method="POST" class="space-y-4">
					<div>
						<label class="block text-sm font-medium text-gray-700 mb-1">Admin
							Email</label>
						<input type="email" name="email" required
							class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-900">
					</div>
					<div>
						<label
							class="block text-sm font-medium text-gray-700 mb-1">Password</label>
						<input type="password" name="password" required
							class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-900">
					</div>
					<button type="submit"
						class="w-full bg-blue-900 hover:bg-blue-800 text-white font-bold py-3 rounded-lg transition">Log
						In</button>
				</form>
				<p class="mt-6 text-center text-sm text-gray-600">
					Don't have a shop yet? <button onclick="toggleForms()"
						class="text-blue-900 font-bold hover:underline">Create one</button>
				</p>
			</div>

		</div>
	</div>

	<script>
		function toggleForms() {
			const regForm = document.getElementById('register-form');
			const logForm = document.getElementById('login-form');
			if (regForm.classList.contains('hidden')) {
				regForm.classList.remove('hidden');
				logForm.classList.add('hidden');
			} else {
				regForm.classList.add('hidden');
				logForm.classList.remove('hidden');
			}
		}
	</script>
</body>

</html>
