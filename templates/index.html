<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ledgriq - Modern Retail OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen font-sans text-slate-800 p-4 antialiased">

    <div class="bg-white w-full max-w-4xl rounded-3xl shadow-2xl overflow-hidden flex flex-col md:flex-row border border-slate-100">
        
        <div class="w-full md:w-5/12 bg-gradient-to-br from-indigo-900 to-slate-900 text-white p-10 flex flex-col justify-center relative overflow-hidden">
            <div class="absolute top-0 right-0 w-64 h-64 bg-indigo-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 transform translate-x-20 -translate-y-20"></div>
            <div class="absolute bottom-0 left-0 w-64 h-64 bg-blue-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 transform -translate-x-20 translate-y-20"></div>
            
            <div class="relative z-10">
                <h1 class="text-4xl md:text-5xl font-black tracking-tight mb-2">Ledgriq<span class="text-indigo-400">.</span></h1>
                <p class="text-indigo-200 text-lg font-medium mb-8">The Operating System for Modern Retail.</p>
                
                <ul class="space-y-4 text-sm font-medium text-slate-300">
                    <li class="flex items-center"><span class="bg-indigo-500/30 p-1 rounded-full mr-3 text-indigo-300">✓</span> Cloud Inventory Sync</li>
                    <li class="flex items-center"><span class="bg-indigo-500/30 p-1 rounded-full mr-3 text-indigo-300">✓</span> Automated Invoicing</li>
                    <li class="flex items-center"><span class="bg-indigo-500/30 p-1 rounded-full mr-3 text-indigo-300">✓</span> Client Ledger Management</li>
                </ul>
            </div>
        </div>

        <div class="w-full md:w-7/12 p-10 lg:p-14 bg-white">
            <h2 class="text-2xl font-extrabold text-slate-900">Set up your shop</h2>
            <p class="text-slate-500 text-sm font-medium mb-8 mt-1">Join Ledgriq and start managing your business.</p>

            <form action="/register" method="POST" class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1.5">Shop/Business Name</label>
                    <input type="text" name="shop_name" value="My Premium Store" required class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 outline-none transition-all font-medium text-slate-700">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1.5">Admin Email</label>
                    <input type="email" name="email" value="admin@ledgriq.com" required class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 outline-none transition-all font-medium text-slate-700">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1.5">Password</label>
                    <input type="password" name="password" value="password123" required class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 outline-none transition-all font-medium text-slate-700">
                </div>
                
                <button type="submit" class="w-full bg-gradient-to-r from-indigo-600 to-blue-500 hover:from-indigo-500 hover:to-blue-400 text-white font-bold py-4 rounded-xl shadow-lg shadow-indigo-500/30 transform hover:-translate-y-0.5 transition-all duration-200 mt-4">
                    Launch Dashboard
                </button>
            </form>
            
            <p class="text-center text-sm text-slate-500 mt-8 font-medium">Already have an account? <a href="#" class="text-indigo-600 hover:text-indigo-800 font-bold">Log in</a></p>
        </div>
    </div>
</body>
</html>
